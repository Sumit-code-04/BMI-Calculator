<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>BMI Calculator</title>
</head>
<body>
  <div class="container">
    <h2 id="myh1">Know Your BMI(body mass index): </h2>
  <br>
  <label for="input1">Height: </label>
  <input id="input1" type="number" placeholder="Enter your height(feet)">
  <br><br>
  <label for="input2">Weight:</label>
  <input id="input2" type="number" placeholder="Enter your weight">
  <br><br>
  <button id="submit">Check</button>
  <br><br>
  <p id="result"></p>
  </div>
  
  

  
<script src="index.js"></script>
</body>
</html>
